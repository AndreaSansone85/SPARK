/* ── XYGO HELPERS ────────────────────────────────────────────── */
const fmt = v => v>0?`+${v}`:`${v}`;
function buildNotation(sex,gVals,fluidG,oVals,fluidO){
  if(!sex||gVals.length===0||oVals.length===0) return "";
  const sg=[...gVals].sort((a,b)=>a-b);
  const so=[...oVals].sort((a,b)=>a-b);
  const gStr=(fluidG&&sg.length>1)?`G${fmt(sg[0])}:${fmt(sg[sg.length-1])}`:`G${sg.map(fmt).join(",")}`;
  const oStr=(fluidO&&so.length>1)?`O${fmt(so[0])}:${fmt(so[so.length-1])}`:`O${so.map(fmt).join(",")}`;
  return `${sex}; ${gStr}; ${oStr}`;
}
function petalPath(cx,cy,tx,ty,w){
  const dx=tx-cx,dy=ty-cy,len=Math.sqrt(dx*dx+dy*dy);
  if(!len) return "";
  const px=-dy/len*w,py=dx/len*w;
  const mx=(cx+tx)/2,my=(cy+ty)/2;
  return `M ${cx} ${cy} Q ${mx+px} ${my+py} ${tx} ${ty} Q ${mx-px} ${my-py} ${cx} ${cy} Z`;
}

/* ── XYGO SVG COMPONENTS ─────────────────────────────────────── */
function RoseBg(){

    {d:petalPath(CX,CY,CX,CY-3*U,18),fill:T,o:0.22},
    {d:petalPath(CX,CY,CX,CY+3*U,18),fill:T,o:0.22},

    {d:petalPath(CX,CY,CX-3*U,CY+3*U,12),fill:TL,o:0.15},
  ];
  return(
    <g>
      <circle cx={CX} cy={CY} r={3*U+14} fill={TP} opacity={0.35}/>
      {petals.map((p,i)=><path key={i} d={p.d} fill={p.fill} opacity={p.o}/>)}

      <line x1={CX} y1={CY-3*U} x2={CX} y2={CY+3*U} stroke={TL} strokeWidth={1} opacity={0.28}/>
    </g>
  );
}

function GenderScaleSVG({vals,fluid,onChange}){
  const toggle=p=>onChange(vals.includes(p)?vals.filter(v=>v!==p):[...vals,p]);
  const sorted=[...vals].sort((a,b)=>a-b);
  const hasRange=fluid&&sorted.length>=2;
  const rMin=hasRange?sorted[0]:null;
  const rMax=hasRange?sorted[sorted.length-1]:null;
  const py=p=>CY-p*U;
  return(
    <svg width="100%" viewBox={`0 0 ${SZ} ${SZ}`}
      style={{display:"block",margin:"0 auto",maxWidth:SZ,touchAction:"none"}}>
      <RoseBg/>
      <line x1={CX} y1={py(3)} x2={CX} y2={py(-3)} stroke="#ddeeed" strokeWidth={4} strokeLinecap="round"/>
      {hasRange&&<line x1={CX} y1={py(rMax)} x2={CX} y2={py(rMin)} stroke={TD} strokeWidth={4} strokeLinecap="round" opacity={0.85}/>}
      <text x={CX} y={py(3)-26} textAnchor="middle" dominantBaseline="auto" fill={TD} fontSize={12} fontFamily="DM Sans" fontWeight="600">Femminile</text>
      <text x={CX} y={py(-3)+34} textAnchor="middle" dominantBaseline="auto" fill={TD} fontSize={12} fontFamily="DM Sans" fontWeight="600">Maschile</text>
      {PTS.map(p=>{
        const sel=vals.includes(p);
        const inR=hasRange&&p>rMin&&p<rMax;
        return(
          <g key={p} onPointerDown={()=>toggle(p)} style={{cursor:"pointer"}}>
            <circle cx={CX} cy={py(p)} r={22} fill="transparent"/>
            <circle cx={CX} cy={py(p)} r={16}
              fill={sel?TD:inR?TL:"white"} stroke={sel?TD:inR?TL:"#d4e8e7"} strokeWidth={2.5}
              style={{filter:sel?"drop-shadow(0 2px 6px rgba(42,140,136,0.35))":"none"}}/>
            <text x={CX} y={py(p)} textAnchor="middle" dominantBaseline="middle"
              fontSize={10} fontFamily="DM Sans" fontWeight="700"
              fill={sel?"white":inR?TD:"#aabcbb"} style={{pointerEvents:"none"}}>
              {p===0?"0":p>0?`+${p}`:`${p}`}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function OrientScaleSVG({gVals,fluidG,vals,fluid,onChange}){

  const sg=[...gVals].sort((a,b)=>a-b);
  const gRange=fluidG&&sg.length>=2;
  const px=p=>CX+p*U;

/* ── DONE PLOT (from XYGO v3) ────────────────────────────────── */
/*
 * Full wind rose with the participant's result plotted on it.
 * X axis = sexual orientation  (–3 sesso opposto … +3 stesso sesso)
 * Y axis = gender identity     (–3 maschile      … +3 femminile)
 *
 * Single point  → coral dot + crosshair
 * Fluid G only  → vertical segment for each selected O
 * Fluid O only  → horizontal segment for each selected G
 * Both fluid    → filled coral rectangle spanning the range
 */
function DonePlot({gVals, fluidG, oVals, fluidO}){
  const DSZ=320, DCX=160, DCY=160, DU=32;
  const dpy=p=>DCY-p*DU;
  const dpx=p=>DCX+p*DU;
  const sg=[...gVals].sort((a,b)=>a-b);
  const so=[...oVals].sort((a,b)=>a-b);
  const useGR=fluidG&&sg.length>1;
  const useOR=fluidO&&so.length>1;
  const gMin=sg[0], gMax=sg[sg.length-1];
  const oMin=so[0], oMax=so[so.length-1];
  const combos=[];
  for(const g of gVals) for(const o of oVals) combos.push({g,o});
  const petals=[
    {d:petalPath(DCX,DCY,DCX,DCY-3*DU,18),fill:T,o:0.25},
    {d:petalPath(DCX,DCY,DCX,DCY+3*DU,18),fill:T,o:0.25},
    {d:petalPath(DCX,DCY,DCX+3*DU,DCY,18),fill:T,o:0.25},
    {d:petalPath(DCX,DCY,DCX-3*DU,DCY,18),fill:T,o:0.25},
    {d:petalPath(DCX,DCY,DCX+3*DU,DCY-3*DU,12),fill:TL,o:0.18},
    {d:petalPath(DCX,DCY,DCX-3*DU,DCY-3*DU,12),fill:TL,o:0.18},
    {d:petalPath(DCX,DCY,DCX+3*DU,DCY+3*DU,12),fill:TL,o:0.18},
    {d:petalPath(DCX,DCY,DCX-3*DU,DCY+3*DU,12),fill:TL,o:0.18},
  ];
  const gridDots=[];
  for(let g=-3;g<=3;g++) for(let o=-3;o<=3;o++) gridDots.push({x:dpx(o),y:dpy(g)});
  return(
    <svg width="100%" viewBox={`0 0 ${DSZ} ${DSZ}`}
      style={{display:"block",margin:"0 auto",maxWidth:DSZ}}>
      <circle cx={DCX} cy={DCY} r={3*DU+14} fill={TP} opacity={0.38}/>
      {petals.map((p,i)=><path key={i} d={p.d} fill={p.fill} opacity={p.o}/>)}
      {[-3,-2,-1,1,2,3].map(v=>(
        <g key={v} opacity={0.10}>
          <line x1={dpx(v)} y1={DCY-3*DU} x2={dpx(v)} y2={DCY+3*DU} stroke="#4a7a78" strokeWidth={1}/>
          <line x1={DCX-3*DU} y1={dpy(v)} x2={DCX+3*DU} y2={dpy(v)} stroke="#4a7a78" strokeWidth={1}/>
        </g>
      ))}
      {gridDots.map((d,i)=><circle key={i} cx={d.x} cy={d.y} r={2} fill="white" opacity={0.45}/>)}
      <line x1={DCX-3*DU} y1={DCY} x2={DCX+3*DU} y2={DCY} stroke={TL} strokeWidth={1} opacity={0.30}/>
      <line x1={DCX} y1={DCY-3*DU} x2={DCX} y2={DCY+3*DU} stroke={TL} strokeWidth={1} opacity={0.30}/>
      {/* Axis labels */}
      <text x={DCX} y={dpy(3)-26} textAnchor="middle" dominantBaseline="auto" fill={TD} fontSize={11} fontFamily="DM Sans" fontWeight="600">Femminile</text>
      <text x={DCX} y={dpy(-3)+34} textAnchor="middle" dominantBaseline="auto" fill={TD} fontSize={11} fontFamily="DM Sans" fontWeight="600">Maschile</text>
      <text x={DSZ-9} y={DCY} textAnchor="middle" dominantBaseline="middle" transform={`rotate(-90,${DSZ-9},${DCY})`} fill={TD} fontSize={11} fontFamily="DM Sans" fontWeight="600">Stesso sesso</text>
      <text x={9} y={DCY} textAnchor="middle" dominantBaseline="middle" transform={`rotate(-90,9,${DCY})`} fill={TD} fontSize={11} fontFamily="DM Sans" fontWeight="600">Sesso opposto</text>
      {/* Result markers */}
      {useGR&&useOR&&(
        <rect x={dpx(oMin)} y={dpy(gMax)} width={dpx(oMax)-dpx(oMin)} height={dpy(gMin)-dpy(gMax)}
          fill={CR} opacity={0.22} rx={4}/>
      )}
      {useGR&&so.map(o=>(
        <line key={`fg${o}`} x1={dpx(o)} y1={dpy(gMin)} x2={dpx(o)} y2={dpy(gMax)}
          stroke={CR} strokeWidth={useOR?1.5:4} strokeLinecap="round" opacity={0.78}/>
      ))}
      {useOR&&sg.map(g=>(
        <line key={`fo${g}`} x1={dpx(oMin)} y1={dpy(g)} x2={dpx(oMax)} y2={dpy(g)}
          stroke={CR} strokeWidth={useGR?1.5:4} strokeLinecap="round" opacity={0.78}/>
      ))}
      {combos.length===1&&(()=>{
        const {g,o}=combos[0];
        return<>
          <line x1={dpx(o)} y1={DCY} x2={dpx(o)} y2={dpy(g)} stroke={CR} strokeWidth={1} strokeDasharray="3 3" opacity={0.35}/>
          <line x1={DCX} y1={dpy(g)} x2={dpx(o)} y2={dpy(g)} stroke={CR} strokeWidth={1} strokeDasharray="3 3" opacity={0.35}/>
        </>;
      })()}
      {combos.map(({g,o},i)=>(
        <circle key={i} cx={dpx(o)} cy={dpy(g)} r={9} fill={CR} stroke="white" strokeWidth={2.5} opacity={0.92}/>
      ))}
    </svg>
  );
}

/* ── MAIN APP ─────────────────────────────────────────────────── */
function App(){
  const [phase,setPhase]=useState("splash");
  const [consent,setConsent]=useState(false);
  const scrollRef=useRef(null);

  /* ── TIMING ──────────────────────────────────────────────── */
  const phaseStartRef=useRef(null);   // timestamp (ms) when current phase began
  const prevPhaseRef=useRef(null);    // previous phase name
  const durRef=useRef({});            // accumulated seconds per phase

  /* ── EMAIL OPT-IN ────────────────────────────────────────── */
  const [emailOptIn,setEmailOptIn]=useState("");
  const [emailSent,setEmailSent]=useState(false);
  const [emailBusy,setEmailBusy]=useState(false);

  /* XYGO state */
  const [sex,setSex]=useState(null);
  const [age,setAge]=useState("");
  const [genderLbl,setGenderLbl]=useState("");
  const [genderOth,setGenderOth]=useState("");
  const [orientLbl,setOrientLbl]=useState("");
  const [orientOth,setOrientOth]=useState("");
  const [gVals,setGVals]=useState([]);
  const [fluidG,setFluidG]=useState(false);
  const [oVals,setOVals]=useState([]);
  const [fluidO,setFluidO]=useState(false);

  /* BFI state */
  const [bfi,setBfi]=useState({});

  /* SOI-R state */
  const [soir,setSoir]=useState({});

  /* Desire state */
  const [desireConv,setDesireConv]=useState("");
  const [desirePersonals,setDesirePersonals]=useState([""]); // array of personal definitions
  const [desireDiff,setDesireDiff]=useState(null);

  /* Submission */
  const [busy,setBusy]=useState(false);
  const [errMsg,setErrMsg]=useState("");

  const notation=buildNotation(sex,gVals,fluidG,oVals,fluidO);

  const GENDER_OPTS=["Cisgender","Transgender","Agender","Senza genere","Pangender","Gender fluid","Altro…"];
  const ORIENT_OPTS=["Eterosessuale","Omosessuale","Asessuale","Pansessuale","Bisessuale","Altro…"];
  const gLast=GENDER_OPTS[GENDER_OPTS.length-1];
  const oLast=ORIENT_OPTS[ORIENT_OPTS.length-1];

  const setBfiItem=(n,v)=>setBfi(prev=>({...prev,[n]:v}));
  const setSoirItem=(n,v)=>setSoir(prev=>({...prev,[n]:v}));

  const bfiPageOk=pi=>BFI_PAGES[pi].every(item=>bfi[item.n]!==undefined);
  const soirOk=()=>{for(let i=1;i<=9;i++){if(soir[i]===undefined)return false;}return true;};
  const desireOk=desireConv.trim().length>=15;

  const bfiCount=Object.keys(bfi).length;

  /* Submit email opt-in as a SEPARATE anonymous call (no participant data) */
  const submitEmail=async()=>{
    if(!emailOptIn.trim()||emailBusy||emailSent) return;
    setEmailBusy(true);
    try{
      await fetch(WEBHOOK,{method:"POST",mode:"no-cors",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({
          type:"email_optin",
          timestamp:new Date().toISOString(),
          email:emailOptIn.trim(),
        })
      });
      setEmailSent(true);
    }catch(_){}
    finally{setEmailBusy(false);}
  };

  /* Scroll to top on phase change */
  useEffect(()=>{window.scrollTo({top:0,behavior:"smooth"});},[phase]);

  /* Timing: record duration of each phase on transition */
  useEffect(()=>{
    const now=Date.now();
    const prev=prevPhaseRef.current;
    // Don't record splash (user may leave it open a long time)
    if(prev && prev!=="splash" && phaseStartRef.current!==null){
      const sec=Math.round((now-phaseStartRef.current)/1000);
      durRef.current[prev]=(durRef.current[prev]||0)+sec;
    }
    prevPhaseRef.current=phase;
    phaseStartRef.current=now;
  },[phase]);

  /* BFI domain scoring */
  const bfiScore=items=>items.reduce((acc,item)=>{
    const raw=bfi[item.n]||3;
    return acc+(item.r?(6-raw):raw);
  },0);

  const submit=async()=>{
    if(busy) return;
    setBusy(true); setErrMsg("");
    const payload={
      timestamp:new Date().toISOString(),
      sex, age, notation,
      genderLabel: genderLbl===gLast?genderOth:genderLbl,
      orientLabel: orientLbl===oLast?orientOth:orientLbl,
      genderScores:[...gVals].sort((a,b)=>a-b).join(","),
      fluidGender:fluidG,
      orientScores:[...oVals].sort((a,b)=>a-b).join(","),
      fluidOrient:fluidO,
      bfi_raw:JSON.stringify(bfi),
      bfi_E:bfiScore(BFI.filter(i=>i.d==="E")),
      bfi_A:bfiScore(BFI.filter(i=>i.d==="A")),
      bfi_C:bfiScore(BFI.filter(i=>i.d==="C")),
      bfi_N:bfiScore(BFI.filter(i=>i.d==="N")),
      bfi_O:bfiScore(BFI.filter(i=>i.d==="O")),
      soir_raw:JSON.stringify(soir),
      desireConventional:desireConv,
      desirePersonal:JSON.stringify(desirePersonals.filter(s=>s.trim().length>0)),
      desireDifferent:desireDiff,
      // Timing (seconds per phase)
      time_sex:       durRef.current.sex       || 0,
      time_identity:  durRef.current.identity  || 0,
      time_drawG:     durRef.current.drawG     || 0,
      time_drawO:     durRef.current.drawO     || 0,
      time_bfi_0:     durRef.current.bfi_0     || 0,
      time_bfi_1:     durRef.current.bfi_1     || 0,
      time_bfi_2:     durRef.current.bfi_2     || 0,
      time_bfi_3:     durRef.current.bfi_3     || 0,
      time_soir:      durRef.current.soir      || 0,
      time_desire:    durRef.current.desire    || 0,
      time_total:     Object.values(durRef.current).reduce((a,b)=>a+b,0),
    };
    try{
      await fetch(WEBHOOK,{method:"POST",mode:"no-cors",
        headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)});
      setPhase("done");
    }catch{
      setErrMsg("Impossibile inviare. Controlla la connessione e riprova.");
    }finally{setBusy(false);}
  };

  /* ── SPLASH ─────────────────────────────────────────────────── */
  if(phase==="splash") return(

        <div style={{background:TP,borderRadius:14,padding:"18px",marginBottom:20,border:`1px solid ${TL}`}}>
          <p style={{fontSize:12,fontWeight:"600",color:TD,marginBottom:8,letterSpacing:0.3}}>
            INFORMATIVA PER I PARTECIPANTI
          </p>
          <p style={{fontSize:13,color:"#3a5c5b",lineHeight:1.75,marginBottom:10}}>

          </p>
          <p style={{fontSize:13,color:"#3a5c5b",lineHeight:1.75,marginBottom:10}}>
            I dati saranno utilizzati <strong>esclusivamente a scopo di ricerca e didattico</strong>. La partecipazione è completamente <strong>anonima</strong>: non vengono raccolti dati identificativi.
          </p>
          <p style={{fontSize:13,color:"#3a5c5b",lineHeight:1.75}}>
            Il questionario richiede circa <strong>15 minuti</strong>. Puoi interrompere in qualsiasi momento senza conseguenze. Non esistono risposte giuste o sbagliate.
          </p>
        </div>

        <div style={{background:"#fffaf0",borderRadius:10,padding:"12px 14px",marginBottom:20,
          border:"1.5px solid #f0d8b0",fontSize:12,color:"#8a6040",lineHeight:1.6}}>

        </div>

        <label style={{display:"flex",alignItems:"flex-start",gap:12,cursor:"pointer",
          background:"white",borderRadius:12,padding:"16px",marginBottom:24,
          border:`1.5px solid ${consent?TD:"#d4e8e7"}`,transition:"border-color 0.2s"}}>

          <span style={{fontSize:13,color:"#4a6665",lineHeight:1.6}}>

        </label>

  /* ── SEX ────────────────────────────────────────────────────── */
  if(phase==="sex") return(
    <div style={wrap}>

        <StepDots current={0} total={10}/>

        </h2>

    </div>

  /* ── IDENTITY ───────────────────────────────────────────────── */

            </label>
            {ORIENT_OPTS.map(o=>optBtn(o,orientLbl===o,()=>setOrientLbl(o)))}
            {orientLbl===oLast&&(
              <input type="text" value={orientOth} onChange={e=>setOrientOth(e.target.value)}
                placeholder="Specifica…"
                style={{width:"100%",padding:"10px 14px",marginTop:2,
                  border:`1.5px solid ${T}`,borderRadius:9,fontSize:13,
                  fontFamily:"'DM Sans',sans-serif",background:"#fafefe"}}/>
            )}
          </div>
          <NavButtons onBack={()=>setPhase("sex")} onNext={()=>setPhase("drawG")} nextDisabled={!identOk}/>
        </div>
      </div>
    );
  }

  /* ── GENDER SCALE ───────────────────────────────────────────── */
  if(phase==="drawG") return(
    <div style={wrap}>
      <div style={card}>
        <StepDots current={2} total={10}/>
        <SectionBadge color={TD} bg={TP} label="XYGO"/>
        <h2 style={{fontFamily:"'DM Serif Display',serif",color:TD,fontSize:22,marginBottom:6}}>
          Identità di genere
        </h2>
        <p style={{fontSize:13,color:"#8aabaa",lineHeight:1.65,marginBottom:16}}>
          L'identità di genere è la percezione intima e profonda che una persona ha del proprio genere. Può o meno corrispondere al sesso assegnato alla nascita.{" "}
          <strong style={{color:TD}}>Tocca uno o più punti</strong> sulla scala verticale.
        </p>
        <GenderScaleSVG vals={gVals} fluid={fluidG} onChange={setGVals}/>
        <FluidBox checked={fluidG} onChange={setFluidG}
          label="La mia identità di genere è fluida"
          hint="Se selezionato, i punti scelti vengono mostrati come intervallo continuo."/>
        <NavButtons onBack={()=>setPhase("identity")} onNext={()=>setPhase("drawO")} nextDisabled={gVals.length===0}/>
      </div>
    </div>
  );

  /* ── ORIENT SCALE ───────────────────────────────────────────── */
  if(phase==="drawO") return(
    <div style={wrap}>
      <div style={card}>
        <StepDots current={3} total={10}/>
        <SectionBadge color={TD} bg={TP} label="XYGO"/>
        <h2 style={{fontFamily:"'DM Serif Display',serif",color:TD,fontSize:22,marginBottom:6}}>
          Orientamento sessuale
        </h2>
        <p style={{fontSize:13,color:"#8aabaa",lineHeight:1.65,marginBottom:16}}>
          L'orientamento sessuale è il pattern stabile di attrazione emotiva, romantica e/o sessuale verso gli altri.{" "}
          <strong style={{color:TD}}>Tocca uno o più punti</strong> sulla scala orizzontale.
        </p>
        <OrientScaleSVG gVals={gVals} fluidG={fluidG} vals={oVals} fluid={fluidO} onChange={setOVals}/>
        <FluidBox checked={fluidO} onChange={setFluidO}
          label="Il mio orientamento sessuale è fluido"
          hint="Se selezionato, i punti scelti vengono mostrati come intervallo continuo."/>
        {notation&&(
          <div style={{background:TP,borderRadius:11,padding:"12px 16px",textAlign:"center",
            marginTop:18,border:`1px solid ${TL}`}}>
            <div style={{fontSize:10,color:"#8aabaa",marginBottom:4,fontWeight:"600",letterSpacing:1}}>
              NOTAZIONE XYGO
            </div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:TD,letterSpacing:1}}>
              {notation}
            </div>
          </div>
        )}
        <NavButtons onBack={()=>setPhase("drawG")} onNext={()=>setPhase("bfi_0")} nextDisabled={oVals.length===0}/>
      </div>
    </div>
  );

  /* ── BFI PAGES ──────────────────────────────────────────────── */
  for(let pi=0;pi<4;pi++){
    if(phase===`bfi_${pi}`){
      const items=BFI_PAGES[pi];
      const isOk=bfiPageOk(pi);
      const nextPhase=pi<3?`bfi_${pi+1}`:"soir";
      const prevPhase=pi>0?`bfi_${pi-1}`:"drawO";
      return(
        <div style={wrap}>
          <div style={card}>
            <StepDots current={4+pi} total={10}/>
            <SectionBadge color="#6666aa" bg="#eeeefc" label="BIG FIVE INVENTORY"/>
            <h2 style={{fontFamily:"'DM Serif Display',serif",color:TD,fontSize:22,marginBottom:6}}>
              Personalità
            </h2>
            <p style={{fontSize:13,color:"#8aabaa",lineHeight:1.6,marginBottom:6}}>
              Indica quanto sei d'accordo con ciascuna delle seguenti affermazioni su di te.
            </p>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:18}}>
              <span style={{fontSize:11,color:"#b0cac9"}}>Parte {pi+1} di 4 · item {pi*11+1}–{Math.min((pi+1)*11,44)}</span>
              <span style={{fontSize:11,color:bfiCount===44?TD:"#b0cac9",fontWeight:"600"}}>
                {bfiCount}/44 {bfiCount===44?"✓":"completati"}
              </span>
            </div>
            {items.map(item=>(
              <LikertRow key={item.n} n={item.n} text={item.t} value={bfi[item.n]} onChange={v=>setBfiItem(item.n,v)}/>
            ))}
            <NavButtons onBack={()=>setPhase(prevPhase)} onNext={()=>setPhase(nextPhase)} nextDisabled={!isOk}/>
          </div>
        </div>
      );
    }
  }

  /* ── SOI-R ──────────────────────────────────────────────────── */
  if(phase==="soir") return(
    <div style={wrap}>
      <div style={card}>
        <StepDots current={8} total={10}/>
        <SectionBadge color="#c87040" bg="#fff0e0" label="SOI-R"/>
        <h2 style={{fontFamily:"'DM Serif Display',serif",color:TD,fontSize:22,marginBottom:6}}>
          Orientamento sociossessuale
        </h2>
        <p style={{fontSize:13,color:"#8aabaa",lineHeight:1.6,marginBottom:22}}>
          Rispondi sinceramente alle seguenti domande. Non esistono risposte giuste o sbagliate.
          Fai riferimento al tuo comportamento, atteggiamenti e pensieri <strong>in generale</strong>.
        </p>

        <div style={{borderLeft:`3px solid ${TD}`,paddingLeft:14,marginBottom:20}}>
          <p style={{fontSize:11,color:TD,fontWeight:"700",marginBottom:14,letterSpacing:1}}>COMPORTAMENTO</p>
          {SOIR_BEH.map(item=>(
            <FreqSelect key={item.n} n={item.n} text={item.t} value={soir[item.n]}
              onChange={v=>setSoirItem(item.n,v)} opts={SOIR_BEH_OPTS}/>
          ))}
        </div>

        <div style={{borderLeft:`3px solid #c87040`,paddingLeft:14,marginBottom:20}}>
          <p style={{fontSize:11,color:"#c87040",fontWeight:"700",marginBottom:14,letterSpacing:1}}>ATTEGGIAMENTO</p>
          {SOIR_ATT.map(item=>(
            <Scale9Row key={item.n} n={item.n} text={item.t} value={soir[item.n]}
              onChange={v=>setSoirItem(item.n,v)}/>
          ))}
        </div>

        <div style={{borderLeft:`3px solid #8866aa`,paddingLeft:14,marginBottom:8}}>
          <p style={{fontSize:11,color:"#8866aa",fontWeight:"700",marginBottom:14,letterSpacing:1}}>DESIDERIO</p>
          {SOIR_DES.map(item=>(
            <FreqSelect key={item.n} n={item.n} text={item.t} value={soir[item.n]}
              onChange={v=>setSoirItem(item.n,v)} opts={SOIR_FREQ_OPTS}/>
          ))}
        </div>

        <NavButtons onBack={()=>setPhase("bfi_3")} onNext={()=>setPhase("desire")} nextDisabled={!soirOk()}/>
      </div>
    </div>
  );

  /* ── DESIRE DEFINITIONS ─────────────────────────────────────── */
  if(phase==="desire") return(
    <div style={wrap}>
      <div style={card}>
        <StepDots current={9} total={10}/>
        <SectionBadge color="#8866aa" bg="#f8f0ff" label="DESIDERIO SESSUALE"/>
        <h2 style={{fontFamily:"'DM Serif Display',serif",color:TD,fontSize:22,marginBottom:6}}>
          Definizioni e percezioni
        </h2>
        <p style={{fontSize:13,color:"#8aabaa",lineHeight:1.65,marginBottom:26}}>
          In questa sezione ti chiediamo di riflettere su <strong>come definisci e percepisci il desiderio sessuale</strong>. Non ci sono risposte corrette — ci interessa la tua prospettiva personale.
        </p>

        {/* A: Conventional definition */}
        <div style={{marginBottom:26,padding:"18px",background:"#fafefe",
          borderRadius:14,border:"1.5px solid #e8eeee"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <div style={{background:TP,borderRadius:"50%",width:30,height:30,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:14,fontWeight:"700",color:TD,flexShrink:0}}>A</div>
            <p style={{fontSize:14,color:INK,fontWeight:"600",lineHeight:1.4}}>
              Definizione <em>convenzionale</em> del desiderio sessuale
            </p>
          </div>
          <p style={{fontSize:12,color:"#9aabaa",lineHeight:1.65,marginBottom:12,paddingLeft:40}}>
            Come pensi che il desiderio sessuale venga comunemente descritto — ad esempio in un manuale di sessuologia, su un'enciclopedia, o nel linguaggio di tutti i giorni?
          </p>
          <textarea value={desireConv} onChange={e=>setDesireConv(e.target.value)}
            placeholder="Scrivi qui la definizione che ritieni 'convenzionale'…"
            rows={4}
            style={{width:"100%",padding:"12px 14px",
              border:`1.5px solid ${desireConv.trim().length>=15?TL:"#d4e8e7"}`,
              borderRadius:10,fontSize:13,fontFamily:"'DM Sans',sans-serif",
              lineHeight:1.65,color:INK,background:"white"}}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
            <span style={{fontSize:10,color:"#b0cac9"}}>Minimo ~15 caratteri</span>
            <span style={{fontSize:10,color:desireConv.trim().length>=15?TD:"#b0cac9"}}>
              {desireConv.length} car. {desireConv.trim().length>=15?"✓":""}
            </span>
          </div>
        </div>

        {/* B: Match with personal */}
        <div style={{marginBottom:26,padding:"18px",background:"#fafefe",
          borderRadius:14,border:"1.5px solid #e8eeee"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <div style={{background:"#f8f0ff",borderRadius:"50%",width:30,height:30,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:14,fontWeight:"700",color:"#8866aa",flexShrink:0}}>B</div>
            <p style={{fontSize:14,color:INK,fontWeight:"600",lineHeight:1.4}}>
              La tua percezione personale coincide con la definizione convenzionale?
            </p>
          </div>
          <div style={{display:"flex",gap:8}}>
            {[{v:"yes",l:"Sì, coincide"},{v:"partial",l:"In parte"},{v:"no",l:"No, è diversa"}].map(opt=>(
              <button key={opt.v} onClick={()=>setDesireDiff(opt.v)} style={{
                flex:1,padding:"11px 6px",borderRadius:9,cursor:"pointer",
                border:`1.5px solid ${desireDiff===opt.v?TD:"#d4e8e7"}`,
                background:desireDiff===opt.v?TP:"white",
                color:desireDiff===opt.v?TD:"#4a6665",
                fontSize:12,fontWeight:desireDiff===opt.v?"600":"400",
                fontFamily:"'DM Sans',sans-serif",transition:"all 0.12s"
              }}>{opt.l}</button>
            ))}
          </div>
        </div>

        {/* C: Personal perception — dynamic list */}
        <div style={{marginBottom:8,padding:"18px",background:"#fafefe",
          borderRadius:14,border:"1.5px solid #e8eeee"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <div style={{background:"#fff0e0",borderRadius:"50%",width:30,height:30,
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:14,fontWeight:"700",color:"#c87040",flexShrink:0}}>C</div>
            <div>
              <p style={{fontSize:14,color:INK,fontWeight:"600",lineHeight:1.4}}>
                Come percepisci <em>personalmente</em> il desiderio sessuale?
              </p>
              <span style={{fontSize:11,color:"#b0cac9"}}>facoltativo · puoi aggiungere più voci</span>
            </div>
          </div>
          <p style={{fontSize:12,color:"#9aabaa",lineHeight:1.65,marginBottom:12,paddingLeft:40}}>
            Descrivi con parole tue come senti e vivi il desiderio sessuale. Puoi includere aspetti emotivi, fisici, cognitivi, relazionali — qualsiasi elemento ti sembri rilevante. Se vuoi fornire più di una definizione, usa il pulsante sotto.
          </p>
          {desirePersonals.map((def,i)=>(
            <div key={i} style={{marginBottom:10,position:"relative"}}>
              {desirePersonals.length>1&&(
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                  <span style={{fontSize:11,color:"#c87040",fontWeight:"600"}}>Definizione {i+1}</span>
                  <button onClick={()=>setDesirePersonals(desirePersonals.filter((_,j)=>j!==i))}
                    style={{background:"none",border:"none",cursor:"pointer",color:"#e05c5c",
                      fontSize:16,lineHeight:1,padding:"0 4px",fontFamily:"'DM Sans',sans-serif"}}>
                    ×
                  </button>
                </div>
              )}
              <textarea value={def} onChange={e=>{
                  const next=[...desirePersonals];
                  next[i]=e.target.value;
                  setDesirePersonals(next);
                }}
                placeholder={`Definizione personale${i===0?" (facoltativa)":""}…`}
                rows={3}
                style={{width:"100%",padding:"12px 14px",
                  border:"1.5px solid #d4e8e7",borderRadius:10,
                  fontSize:13,fontFamily:"'DM Sans',sans-serif",
                  lineHeight:1.65,color:INK,background:"white"}}/>
            </div>
          ))}
          <button onClick={()=>setDesirePersonals([...desirePersonals,""])}
            style={{marginTop:4,background:"white",border:`1.5px dashed ${TL}`,
              borderRadius:9,padding:"9px 16px",cursor:"pointer",
              fontSize:12,color:TD,fontWeight:"600",fontFamily:"'DM Sans',sans-serif",
              display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:16,lineHeight:1}}>+</span> Aggiungi un'altra definizione
          </button>
        </div>

        {errMsg&&<p style={{color:CR,fontSize:13,textAlign:"center",marginTop:14}}>{errMsg}</p>}

        <NavButtons
          onBack={()=>setPhase("soir")}
          onNext={submit}
          nextDisabled={!desireOk||busy}
          nextLabel={busy?"Invio in corso…":"Invia ✓"}
        />
        <p style={{fontSize:11,color:"#b0cac9",textAlign:"center",marginTop:12}}>
          Le sezioni A è obbligatoria · B e C sono facoltative ma molto utili
        </p>
      </div>
    </div>
  );

  /* ── DONE ───────────────────────────────────────────────────── */
  return(
    <div style={{...wrap,justifyContent:"center"}}>
      <div style={{...card,textAlign:"center",padding:"44px 28px"}}>

                {emailBusy?"Invio…":"Iscriviti →"}
              </button>
            </div>
          ):(
            <p style={{fontSize:13,color:"#8866aa",fontWeight:"600",textAlign:"center"}}>
              ✓ Email registrata — grazie per il tuo interesse!
            </p>
          )}
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
